<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8/3 dui dẻ mạnh khỏe nhó</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffd1dc);
      position: relative;
    }

    /* Nền lấp lánh */
    .sparkles span {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: sparkle 5s linear infinite;
      box-shadow: 0 0 10px #fff;
    }

    @keyframes sparkle {
      0% {
        transform: translateY(100vh) scale(0.4);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      width: 380px;
      padding: 30px 20px 40px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.25);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.45);
      z-index: 2;
      animation: floatCard 3s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      color: #ff2e7a;
      text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      color: #a63d68;
      margin-bottom: 24px;
    }

    /* Bông hoa */
    .flower {
      position: relative;
      width: 180px;
      height: 240px;
      margin: 0 auto 20px;
    }

    .petal {
      position: absolute;
      width: 70px;
      height: 100px;
      background: radial-gradient(circle at 30% 30%, #ffb6d5, #ff4f93 70%);
      border-radius: 50% 50% 45% 45%;
      top: 30px;
      left: 55px;
      transform-origin: center bottom;
      box-shadow: 0 8px 18px rgba(255, 79, 147, 0.35);
    }

    .p1 { transform: rotate(0deg) translateY(-35px); }
    .p2 { transform: rotate(45deg) translateY(-35px); }
    .p3 { transform: rotate(90deg) translateY(-35px); }
    .p4 { transform: rotate(135deg) translateY(-35px); }
    .p5 { transform: rotate(180deg) translateY(-35px); }
    .p6 { transform: rotate(225deg) translateY(-35px); }
    .p7 { transform: rotate(270deg) translateY(-35px); }
    .p8 { transform: rotate(315deg) translateY(-35px); }

    .center {
      position: absolute;
      top: 75px;
      left: 50%;
      transform: translateX(-50%);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe66d, #ffb703);
      box-shadow: 0 0 18px rgba(255, 200, 0, 0.6);
      z-index: 3;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 18px rgba(255, 200, 0, 0.5); }
      50% { box-shadow: 0 0 28px rgba(255, 200, 0, 0.9); }
    }

    .stem {
      position: absolute;
      width: 10px;
      height: 110px;
      background: linear-gradient(to bottom, #3fbf63, #1f8a3b);
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
      z-index: 1;
    }

    .leaf {
      position: absolute;
      width: 48px;
      height: 24px;
      background: linear-gradient(135deg, #7df08a, #2ea34b);
      border-radius: 50px 0 50px 0;
      top: 165px;
      z-index: 1;
    }

    .leaf.left {
      left: 42px;
      transform: rotate(-28deg);
    }

    .leaf.right {
      right: 42px;
      transform: scaleX(-1) rotate(-28deg);
    }

    .message {
      font-size: 1.15rem;
      color: #b03060;
      font-weight: 700;
      margin-top: 10px;
      line-height: 1.6;
    }

    .highlight {
      color: #ff2e7a;
      font-size: 1.4rem;
      text-shadow: 0 0 10px rgba(255, 46, 122, 0.25);
    }

    .small-note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #8c4a64;
    }

    .heart {
      position: absolute;
      color: #ff4f93;
      font-size: 20px;
      animation: flyHeart 4s linear infinite;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes flyHeart {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-220px) scale(1.4) rotate(15deg);
        opacity: 0;
      }
    }

    .btn {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff4f93, #ff7eb3);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(255, 79, 147, 0.3);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 14px 26px rgba(255, 79, 147, 0.45);
    }

    .popup {
      margin-top: 16px;
      color: #d81b60;
      font-weight: 700;
      min-height: 28px;
      transition: 0.3s;
    }

    @media (max-width: 480px) {
      .card {
        width: 92%;
        padding: 24px 16px 32px;
      }

      .title {
        font-size: 1.7rem;
      }

      .message {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles" id="sparkles"></div>

  <div class="card">
    <div class="title">Mừng 8/3 nhó 🌸</div>
    <div class="subtitle">Một bông hoa nhỏ dành tặng eim Ling</div>

    <div class="flower" id="flower">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
      <div class="petal p4"></div>
      <div class="petal p5"></div>
      <div class="petal p6"></div>
      <div class="petal p7"></div>
      <div class="petal p8"></div>
      <div class="center"></div>
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>

    <div class="message">
      <span class="highlight">Cảm ơn em</span><br>
      vì đã luôn dịu dàng, đáng yêu<br>
      và làm mọi thứ trở nên ấm áp hơn hehe 💖
    </div>

    <div class="small-note">
      Chúc em luôn vui vẻ, hạnh phúc và rực rỡ như bông hoa này nhé!
    </div>

    <button class="btn" onclick="showWish()">Nhấn để nhận lời chúc nhóoo ✨</button>
    <div class="popup" id="popup"></div>
  </div>

  <script>
    const sparkles = document.getElementById("sparkles");

    for (let i = 0; i < 24; i++) {
      const s = document.createElement("span");
      s.style.left = Math.random() * 100 + "vw";
      s.style.animationDuration = (3 + Math.random() * 4) + "s";
      s.style.animationDelay = Math.random() * 4 + "s";
      s.style.width = s.style.height = (4 + Math.random() * 8) + "px";
      sparkles.appendChild(s);
    }

    const flower = document.getElementById("flower");

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤";
      heart.style.left = (window.innerWidth / 2 - 10 + (Math.random() * 120 - 60)) + "px";
      heart.style.top = (window.innerHeight / 2 + 60 + Math.random() * 40) + "px";
      heart.style.fontSize = (16 + Math.random() * 16) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 4000);
    }

    setInterval(createHeart, 700);

    const wishes = [
      "Em xứng đáng với mọi điều ngọt ngào nhất 🌷",
      "Mong nụ cười của em luôn rạng rỡ mỗi ngày ✨",
      "Chúc em 8/3 thật hạnh phúc và đáng nhớ 💕",
      "Luôn xinh đẹp, tự tin và gặp thật nhiều may mắn nhé 🌸"
    ];

    function showWish() {
      const popup = document.getElementById("popup");
      const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
      popup.textContent = randomWish;
    }
  </script>
</body>
</html>
